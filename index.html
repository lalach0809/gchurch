<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사역 리소스 허브 | 목자 & 셀리더</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; }
        
        /* 배경 그라데이션 디자인 */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.03) 0%, transparent 50%),
                        radial-gradient(circle at 90% 80%, rgba(249, 115, 22, 0.03) 0%, transparent 50%);
            z-index: -1;
        }

        .glass-morphism {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
        }

        .video-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000;
            border-radius: 1.25rem;
            overflow: hidden;
        }

        #youtubePlayerFrame {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        /* 아코디언 애니메이션 */
        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1), padding 0.3s ease;
            background-color: white;
        }

        .accordion-item.active .accordion-content {
            max-height: 4000px; 
            padding-bottom: 2rem;
        }

        .accordion-header {
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .chevron-icon {
            transition: transform 0.3s ease;
        }

        .accordion-item.active .chevron-icon {
            transform: rotate(180deg);
        }

        .content-body {
            line-height: 1.9;
            word-break: keep-all;
            letter-spacing: -0.01em;
            white-space: pre-wrap;
        }

        html { scroll-behavior: smooth; }
    </style>
</head>
<body class="text-slate-900 min-h-screen pb-20">

    <!-- 상단 네비게이션 바 (복구 및 링크 수정) -->
    <nav class="sticky top-0 z-50 glass-morphism">
        <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.reload()">
                <div class="bg-indigo-600 p-1.5 rounded-lg shadow-lg">
                    <i data-lucide="church" class="text-white w-5 h-5"></i>
                </div>
                <h1 class="font-bold text-lg tracking-tight hidden sm:block text-slate-800">사역 리소스 허브</h1>
            </div>
            
            <div class="flex items-center gap-6">
                <!-- 셀방 예약 메뉴: 지정된 링크로 매핑 -->
                <a href="http://gchurch.tiiny.site" target="_blank" class="text-sm font-semibold text-slate-600 hover:text-indigo-600 transition-colors flex items-center gap-1.5">
                    <i data-lucide="calendar-days" class="w-4 h-4"></i> 셀방 예약
                </a>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-12">
        <!-- 로딩 대기 -->
        <div id="loading" class="flex flex-col items-center justify-center py-32">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-indigo-600"></div>
            <p id="loadingText" class="mt-4 text-slate-400 font-medium tracking-wide">사역 데이터를 동기화 중입니다...</p>
        </div>

        <div id="dashboard" class="hidden">
            <!-- 페이지 헤더 -->
            <header class="mb-12">
                <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 border-b border-slate-200 pb-8">
                    <div>
                        <span id="displayDate" class="text-indigo-600 font-bold text-xs tracking-[0.2em] uppercase mb-3 block font-medium">0000-00-00</span>
                        <h2 id="displayTitle" class="text-3xl md:text-5xl font-black text-slate-800 leading-tight">이번 주 사역 가이드</h2>
                    </div>
                    <div class="flex items-center gap-3">
                        <select id="weekSelector" onchange="handleWeekChange(this.value)" class="bg-white border border-slate-200 text-slate-700 text-sm rounded-full px-6 py-2.5 shadow-sm outline-none cursor-pointer focus:ring-2 focus:ring-indigo-500/20 appearance-none pr-10 relative">
                            <option value="latest">최신 자료 보기</option>
                        </select>
                    </div>
                </div>
            </header>

            <!-- 컨텐츠 영역 -->
            <div class="space-y-6" id="mainContent">
                
                <!-- 1. 금주의 설교 영상 -->
                <div id="videoAccordion" class="accordion-item bg-white rounded-[2.5rem] shadow-xl shadow-slate-200/50 border border-slate-100 overflow-hidden border-l-8 border-l-red-500">
                    <div class="accordion-header p-7 flex items-center justify-between hover:bg-red-50/30" onclick="toggleAccordion('videoAccordion')">
                        <div class="flex items-center gap-4">
                            <div class="p-3 bg-red-100 rounded-2xl text-red-600">
                                <i data-lucide="play-circle" class="w-6 h-6"></i>
                            </div>
                            <span class="font-extrabold text-slate-800 text-xl">금주의 설교 영상</span>
                        </div>
                        <i data-lucide="chevron-down" class="chevron-icon text-slate-400 w-6 h-6"></i>
                    </div>
                    <div class="accordion-content px-4 md:px-8">
                        <div class="p-2">
                            <div id="videoPlaceholder" class="video-container shadow-2xl mb-6">
                                <div id="youtubePlayerFrame"></div>
                            </div>
                            <a id="youtubeDirectLink" href="#" target="_blank" class="w-full flex items-center justify-center gap-2 py-4 bg-slate-50 hover:bg-red-50 hover:text-red-700 text-slate-500 rounded-[1.5rem] text-sm font-bold transition-all border border-transparent hover:border-red-100">
                                <i data-lucide="youtube" class="w-5 h-5"></i> 유튜브 사이트에서 바로 보기
                            </a>
                        </div>
                    </div>
                </div>

                <!-- 2. 설교 요약 -->
                <div id="pdfAccordion" class="accordion-item bg-white rounded-[2.5rem] shadow-xl shadow-slate-200/50 border border-slate-100 overflow-hidden border-l-8 border-l-emerald-500">
                    <div class="accordion-header p-7 flex items-center justify-between hover:bg-emerald-50/30" onclick="toggleAccordion('pdfAccordion')">
                        <div class="flex items-center gap-4">
                            <div class="p-3 bg-emerald-100 rounded-2xl text-emerald-600">
                                <i data-lucide="file-text" class="w-6 h-6"></i>
                            </div>
                            <span class="font-extrabold text-slate-800 text-xl">설교 요약</span>
                        </div>
                        <i data-lucide="chevron-down" class="chevron-icon text-slate-400 w-6 h-6"></i>
                    </div>
                    <div class="accordion-content px-10 md:px-12">
                        <div id="pdfTextBody" class="content-body text-slate-700 text-base py-4"></div>
                        <div class="mt-6 pt-6 border-t border-slate-100 flex justify-end">
                            <a id="pdfLinkRaw" href="#" target="_blank" class="text-xs text-emerald-600 font-bold flex items-center gap-2 bg-emerald-50 px-6 py-3 rounded-full hover:bg-emerald-100 transition-colors">
                                PDF 원본파일 다운로드 <i data-lucide="download" class="w-4 h-4"></i>
                            </a>
                        </div>
                    </div>
                </div>

                <!-- 3. 나눔 질문 -->
                <div id="pptAccordion" class="accordion-item bg-white rounded-[2.5rem] shadow-xl shadow-slate-200/50 border border-slate-100 overflow-hidden border-l-8 border-l-orange-500">
                    <div class="accordion-header p-7 flex items-center justify-between hover:bg-orange-50/30" onclick="toggleAccordion('pptAccordion')">
                        <div class="flex items-center gap-4">
                            <div class="p-3 bg-orange-100 rounded-2xl text-orange-600">
                                <i data-lucide="message-square" class="w-6 h-6"></i>
                            </div>
                            <span class="font-extrabold text-slate-800 text-xl">나눔 질문</span>
                        </div>
                        <i data-lucide="chevron-down" class="chevron-icon text-slate-400 w-6 h-6"></i>
                    </div>
                    <div class="accordion-content px-10 md:px-12">
                        <div id="pptTextBody" class="content-body text-slate-700 text-base py-4 font-medium leading-loose"></div>
                    </div>
                </div>

                <!-- 4. 인포그래픽 -->
                <div id="infoAccordion" class="accordion-item bg-white rounded-[2.5rem] shadow-xl shadow-slate-200/50 border border-slate-100 overflow-hidden border-l-8 border-l-teal-500">
                    <div class="accordion-header p-7 flex items-center justify-between hover:bg-teal-50/30" onclick="toggleAccordion('infoAccordion')">
                        <div class="flex items-center gap-4">
                            <div class="p-3 bg-teal-100 rounded-2xl text-teal-600">
                                <i data-lucide="image" class="w-6 h-6"></i>
                            </div>
                            <span class="font-extrabold text-slate-800 text-xl">인포그래픽</span>
                        </div>
                        <i data-lucide="chevron-down" class="chevron-icon text-slate-400 w-6 h-6"></i>
                    </div>
                    <div class="accordion-content px-10 md:px-12">
                        <div class="py-8 flex flex-col items-start">
                            <div id="infoDateDisplay" class="text-xs font-bold text-teal-600 mb-8 bg-teal-50 px-4 py-1.5 rounded-full"></div>
                            <div class="w-full bg-slate-50 rounded-[2rem] p-12 border border-slate-100 flex flex-col items-center justify-center text-center">
                                <div class="bg-teal-100/50 p-6 rounded-full mb-6">
                                    <i data-lucide="external-link" class="w-10 h-10 text-teal-600"></i>
                                </div>
                                <h5 class="text-slate-800 font-bold text-lg mb-2">원본 파일 확인</h5>
                                <p class="text-slate-500 text-sm mb-8">고해상도 인포그래픽 이미지를 새 창에서 확인하거나 다운로드할 수 있습니다.</p>
                                <a id="infoDirectLink" href="#" target="_blank" class="flex items-center gap-3 px-10 py-4 bg-teal-600 hover:bg-teal-700 text-white rounded-full text-sm font-bold shadow-lg shadow-teal-100 transition-all">
                                    인포그래픽 원본 보기 / 다운로드
                                </a>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 5. 목장 광고 -->
                <div id="adAccordion" class="accordion-item bg-white rounded-[2.5rem] shadow-xl shadow-slate-200/50 border border-slate-100 overflow-hidden border-l-8 border-l-indigo-500">
                    <div class="accordion-header p-7 flex items-center justify-between hover:bg-indigo-50/30" onclick="toggleAccordion('adAccordion')">
                        <div class="flex items-center gap-4">
                            <div class="p-3 bg-indigo-100 rounded-2xl text-indigo-600">
                                <i data-lucide="megaphone" class="w-6 h-6"></i>
                            </div>
                            <span class="font-extrabold text-slate-800 text-xl">목장 광고</span>
                        </div>
                        <i data-lucide="chevron-down" class="chevron-icon text-slate-400 w-6 h-6"></i>
                    </div>
                    <div class="accordion-content px-10 md:px-12">
                        <div id="guideTextBody" class="content-body text-slate-600 text-sm py-4"></div>
                    </div>
                </div>

                <!-- 6. 금주의 목장 찬양 -->
                <div id="praiseAccordion" class="accordion-item bg-white rounded-[2.5rem] shadow-xl shadow-slate-200/50 border border-slate-100 overflow-hidden border-l-8 border-l-indigo-700">
                    <div class="accordion-header p-7 flex items-center justify-between hover:bg-indigo-50/30" onclick="toggleAccordion('praiseAccordion')">
                        <div class="flex items-center gap-4">
                            <div class="p-3 bg-indigo-100 rounded-2xl text-indigo-700">
                                <i data-lucide="music" class="w-6 h-6"></i>
                            </div>
                            <span class="font-extrabold text-slate-800 text-xl">금주의 목장 찬양</span>
                        </div>
                        <i data-lucide="chevron-down" class="chevron-icon text-slate-400 w-6 h-6"></i>
                    </div>
                    <div class="accordion-content px-6 md:px-10">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 py-6">
                            <div id="praise1Wrapper" class="hidden bg-slate-50 p-5 rounded-[2rem] border border-slate-100">
                                <div class="video-container mb-5" id="praise1Video"></div>
                                <a id="praise1Link" href="#" target="_blank" class="flex items-center justify-center gap-2 py-3 bg-white text-slate-600 rounded-2xl text-xs font-bold shadow-sm hover:text-indigo-600 transition-colors">
                                    <i data-lucide="external-link" class="w-3.5 h-3.5"></i> 크게 보기
                                </a>
                            </div>
                            <div id="praise2Wrapper" class="hidden bg-slate-50 p-5 rounded-[2rem] border border-slate-100">
                                <div class="video-container mb-5" id="praise2Video"></div>
                                <a id="praise2Link" href="#" target="_blank" class="flex items-center justify-center gap-2 py-3 bg-white text-slate-600 rounded-2xl text-xs font-bold shadow-sm hover:text-indigo-600 transition-colors">
                                    <i data-lucide="external-link" class="w-3.5 h-3.5"></i> 크게 보기
                                </a>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <footer class="mt-20 border-t border-slate-100 py-16 text-center">
        <p class="text-slate-300 text-[11px] tracking-[0.3em] font-bold uppercase mb-4">Ministry Resource Hub</p>
        <p class="text-slate-400 text-[10px] font-medium uppercase">© 2026 FOR CELL LEADERS. ALL RIGHTS RESERVED.</p>
    </footer>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwwizT5vwToaWgGA7cOfeRVhzI-4nZM4MmWt6czQXS4PzmvfDhC4KMr422ITVapf7OE/exec";
        let allData = [];
        let player;
        let isApiReady = false;

        function onYouTubeIframeAPIReady() {
            isApiReady = true;
            initApp();
        }

        async function initApp() {
            try {
                const response = await fetch(API_URL);
                const responseData = await response.json();
                allData = responseData.sort((a, b) => new Date(b.date) - new Date(a.date));
                populateWeekSelector();
                if (allData.length > 0) renderContent(allData[0]);
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
            } catch (error) {
                console.error("Data Load Error:", error);
                document.getElementById('loadingText').innerText = "데이터 연결 실패. 서버 확인이 필요합니다.";
            }
            lucide.createIcons();
        }

        function toggleAccordion(id) {
            const item = document.getElementById(id);
            item.classList.toggle('active');
        }

        function populateWeekSelector() {
            const selector = document.getElementById('weekSelector');
            selector.innerHTML = '<option value="latest">최신 자료 보기</option>';
            allData.forEach(item => {
                const option = document.createElement('option');
                option.value = item.date;
                const dateStr = item.date ? item.date.substring(0, 10) : "Unknown";
                option.textContent = `${dateStr} (${(item.title || "").substring(0, 12)}...)`;
                selector.appendChild(option);
            });
        }

        function handleWeekChange(date) {
            const selected = date === 'latest' ? allData[0] : allData.find(item => item.date === date);
            if (selected) renderContent(selected);
        }

        function renderContent(item) {
            const cleanDate = item.date ? item.date.substring(0, 10) : "0000-00-00";
            document.getElementById('displayDate').textContent = cleanDate;
            document.getElementById('displayTitle').textContent = item.title;

            const videoId = extractYoutubeId(item.youtube);
            const videoAccordion = document.getElementById('videoAccordion');
            if (videoId && isApiReady) {
                if (!player) {
                    player = new YT.Player('youtubePlayerFrame', {
                        videoId: videoId,
                        playerVars: { 'rel': 0, 'enablejsapi': 1, 'origin': location.origin }
                    });
                } else {
                    player.loadVideoById(videoId);
                }
                document.getElementById('youtubeDirectLink').href = `https://www.youtube.com/watch?v=${videoId}`;
                videoAccordion.style.display = "block";
            } else {
                videoAccordion.style.display = "none";
            }

            // 모든 아코디언 초기 닫기
            document.querySelectorAll('.accordion-item').forEach(el => el.classList.remove('active'));

            updateAccordion('pdfAccordion', 'pdfTextBody', item.pdf_text, false);
            document.getElementById('pdfLinkRaw').href = item.pdf || "#";

            updateAccordion('pptAccordion', 'pptTextBody', item.ppt_text, false);

            const infoAccordion = document.getElementById('infoAccordion');
            const infoDate = document.getElementById('infoDateDisplay');
            const infoLink = document.getElementById('infoDirectLink');
            
            if (item.image && item.image !== "#" && item.image.trim() !== "") {
                infoAccordion.style.display = "block";
                infoDate.textContent = "등록 날짜: " + cleanDate;
                infoLink.href = item.image; 
            } else {
                infoAccordion.style.display = "none";
            }

            updateAccordion('adAccordion', 'guideTextBody', item.content, false);

            renderPraise(item.praise1, 'praise1Wrapper', 'praise1Video', 'praise1Link');
            renderPraise(item.praise2, 'praise2Wrapper', 'praise2Video', 'praise2Link');
            const hasPraise = (item.praise1 && item.praise1 !== "#") || (item.praise2 && item.praise2 !== "#");
            document.getElementById('praiseAccordion').style.display = hasPraise ? "block" : "none";
            
            lucide.createIcons();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateAccordion(accordionId, bodyId, text, shouldBeActive) {
            const accordion = document.getElementById(accordionId);
            const body = document.getElementById(bodyId);
            if (text && text.trim() !== "") {
                accordion.style.display = "block";
                body.textContent = text;
                if (shouldBeActive) accordion.classList.add('active');
                else accordion.classList.remove('active');
            } else {
                accordion.style.display = "none";
                accordion.classList.remove('active');
            }
        }

        function renderPraise(url, wrapperId, videoId, linkId) {
            const id = extractYoutubeId(url);
            const wrapper = document.getElementById(wrapperId);
            if (id) {
                wrapper.classList.remove('hidden');
                document.getElementById(videoId).innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${id}?rel=0" frameborder="0" allowfullscreen></iframe>`;
                document.getElementById(linkId).href = `https://www.youtube.com/watch?v=${id}`;
            } else {
                wrapper.classList.add('hidden');
            }
        }

        function extractYoutubeId(url) {
            if (!url || url === "#") return null;
            const regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[7].length == 11) ? match[7] : null;
        }
    </script>
</body>
</html>
